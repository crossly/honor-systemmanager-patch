<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HONOR System Manager Patch</title>
  <link rel="stylesheet" href="styles.css" type="text/css">
  <link rel="stylesheet" type="text/css" href="/mmrl/insets.css">
  <script type="module" src="scripts.js"></script>
</head>
<body>
  <main class="content">
    <section class="topbar">
      <div>
        <h2>HONOR Patch</h2>
        <p id="version">Loading...</p>
      </div>
      <button id="status">Check</button>
    </section>

    <section class="profiles">
      <div class="profile-row">
        <div class="profile-main">
          <div class="profile-title">
            <h3 data-profile-title="security">Security</h3>
            <span class="mode-pill" data-status="security">...</span>
          </div>
          <p>Security Center and antivirus services</p>
        </div>
        <div class="actions">
          <button data-mode="block" data-profile="security">Block</button>
          <button data-mode="restore" data-profile="security">Restore</button>
        </div>
      </div>

      <div class="profile-row">
        <div class="profile-main">
          <div class="profile-title">
            <h3 data-profile-title="background">Background</h3>
            <span class="mode-pill" data-status="background">...</span>
          </div>
          <p>Smart background and cleanup policy</p>
        </div>
        <div class="actions">
          <button data-mode="block" data-profile="background">Block</button>
          <button data-mode="restore" data-profile="background">Restore</button>
        </div>
      </div>

      <div class="profile-row">
        <div class="profile-main">
          <div class="profile-title">
            <h3 data-profile-title="powerkit">PowerKit</h3>
            <span class="mode-pill" data-status="powerkit">...</span>
          </div>
          <p>Experimental power framework layer</p>
        </div>
        <div class="actions">
          <button data-mode="block" data-profile="powerkit">Block</button>
          <button data-mode="restore" data-profile="powerkit">Restore</button>
        </div>
      </div>
    </section>

    <section class="terminal">
      <div class="terminal-header">
        <span>Output</span>
        <button id="clear">Clear</button>
      </div>
      <pre id="output"></pre>
    </section>
  </main>
</body>
</html>
