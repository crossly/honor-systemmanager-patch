<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HONOR System Manager Patch</title>
  <link rel="stylesheet" href="styles.css" type="text/css">
  <link rel="stylesheet" type="text/css" href="/mmrl/insets.css">
  <script type="module" src="scripts.js"></script>
</head>
<body>
  <main class="content">
    <header>
      <h2>HONOR System Manager Patch</h2>
      <p id="version">Loading...</p>
    </header>

    <section class="buttons">
      <button id="status">Test Status</button>
      <button id="block">Block Services</button>
      <button id="restore">Restore Services</button>
    </section>

    <section class="terminal">
      <div class="terminal-header">
        <span>Output</span>
        <button id="clear">Clear</button>
      </div>
      <pre id="output"></pre>
    </section>
  </main>
</body>
</html>
